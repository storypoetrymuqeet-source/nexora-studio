<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | AI Video Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 25px; max-width: 400px; margin: 0 auto; border: 1px solid #6366f1; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; padding: 10px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #6366f1; border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #loader { display: none; margin: 20px auto; color: #6366f1; font-weight: bold; }
        #videoContainer { margin-top: 20px; display: none; }
        iframe { width: 100%; height: 300px; border-radius: 15px; border: none; }
        .back { display: block; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🎬 AI VIDEO ENGINE</h3>
        <textarea id="p" placeholder="Describe your video (e.g. A cat dancing in rain)"></textarea>
        <button class="btn" onclick="gen()">GENERATE VIDEO</button>
        <div id="loader">🎥 Creating Video... (May take 30-40 seconds)</div>
        <div id="videoContainer">
            <iframe id="vidFrame" src=""></iframe>
        </div>
    </div>
    <a href="index.html" class="back">← Back to Menu</a>

    <script>
        function gen() {
            const p = document.getElementById('p').value;
            const container = document.getElementById('videoContainer');
            const frame = document.getElementById('vidFrame');
            const ld = document.getElementById('loader');

            if(!p) return alert("Kuch likhen!");

            ld.style.display = "block";
            container.style.display = "none";

            // Using a more stable video endpoint
            const seed = Math.floor(Math.random() * 1000);
            const videoUrl = "https://pollinations.ai/p/" + encodeURIComponent(p) + "?model=video&width=720&height=720&seed=" + seed;

            frame.src = videoUrl;
            
            // Wait for the server to process
            setTimeout(() => {
                ld.style.display = "none";
                container.style.display = "block";
            }, 30000); // 30 seconds wait
        }
    </script>
</body>
</html>
