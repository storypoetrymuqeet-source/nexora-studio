<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Image Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 25px; max-width: 400px; margin: 0 auto; border: 1px solid #6366f1; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; padding: 10px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #6366f1; border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #loader { display: none; margin: 20px auto; color: #6366f1; font-weight: bold; }
        #res { width: 100%; border-radius: 15px; margin-top: 20px; display: none; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .back { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🖼️ IMAGE GENERATOR</h3>
        <textarea id="p" placeholder="Describe your imagination..."></textarea>
        <button class="btn" onclick="gen()">GENERATE</button>
        <div id="loader">Wait... AI is painting 🎨</div>
        <img id="res" src="" alt="AI Image">
    </div>
    <a href="index.html" class="back">← Back to Menu</a>

    <script>
        function gen() {
            const p = document.getElementById('p').value;
            const img = document.getElementById('res');
            const ld = document.getElementById('loader');

            if(!p) return alert("Kuch likhen!");

            // Reset image and show loader
            img.style.display = "none";
            ld.style.display = "block";

            // Add Random Seed to bypass server cache
            const seed = Math.floor(Math.random() * 1000000);
            const finalUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(p) + "?width=1024&height=1024&nologo=true&seed=" + seed;

            img.src = finalUrl;

            // When image is fully loaded
            img.onload = function() {
                ld.style.display = "none";
                img.style.display = "block";
            };

            // If image fails to load
            img.onerror = function() {
                ld.innerHTML = "❌ Server Busy. Try clicking GENERATE again!";
                setTimeout(() => { ld.style.display = "none"; }, 3000);
            };
        }
    </script>
</body>
</html>
