<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Horror</title>
    <style>
        body { background: #050000; color: #ff0000; font-family: serif; text-align: center; padding: 20px; }
        .box { background: #1a0000; padding: 25px; border-radius: 25px; max-width: 400px; margin: 0 auto; border: 2px solid #ff0000; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #400000; color: #ff0000; border-radius: 12px; padding: 10px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #600000; border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #res { width: 100%; border-radius: 15px; margin-top: 20px; display: none; border: 1px solid #ff0000; }
        #loader { display: none; margin: 15px; font-weight: bold; }
        .back { display: block; margin-top: 20px; color: #444; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>💀 HORROR ENGINE</h3>
        <textarea id="p" placeholder="Enter your nightmare..."></textarea>
        <button class="btn" onclick="gen()">SUMMON</button>
        <div id="loader">Summoning... 👹</div>
        <img id="res" src="">
    </div>
    <a href="index.html" class="back">← Escape</a>
    <script>
        function gen() {
            const p = document.getElementById('p').value;
            const img = document.getElementById('res');
            const ld = document.getElementById('loader');
            if(!p) return alert("Kuch likhen!");
            img.style.display = "none";
            ld.style.display = "block";
            const seed = Math.floor(Math.random() * 100000);
            img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(p + ", cinematic horror, dark, scary, realistic") + "?model=flux&width=1024&height=1024&nologo=true&seed=" + seed;
            img.onload = () => { ld.style.display = "none"; img.style.display = "block"; };
        }
    </script>
</body>
</html>
