
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Horror Mode</title>
    <style>
        body { background: #050505; color: #ff4d4d; font-family: serif; text-align: center; padding: 20px; }
        .box { background: #1a0000; padding: 25px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 2px solid #ff0000; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #5c0000; color: #ff4d4d; border-radius: 10px; padding: 10px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #990000; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #res { width: 100%; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid #ff0000; }
        .back { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>💀 HORROR ENGINE</h3>
        <textarea id="p" placeholder="Enter your nightmare..."></textarea>
        <button class="btn" onclick="gen()">SUMMON IMAGE</button>
        <img id="res" src="">
    </div>
    <a href="index.html" class="back">← Escape to Menu</a>
    <script>
        function gen() {
            const img = document.getElementById('res');
            const prompt = document.getElementById('p').value + ", cinematic horror, dark atmosphere, scary, realistic, 8k";
            img.style.display = "block";
            img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?nologo=true&seed=" + Math.random();
        }
    </script>
</body>
</html>
