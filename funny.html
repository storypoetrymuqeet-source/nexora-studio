<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Funny</title>
    <style>
        body { background: #fffceb; color: #333; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 25px; max-width: 400px; margin: 0 auto; border: 2px solid #ffd700; }
        textarea { width: 100%; height: 80px; background: #f9f9f9; border: 1px solid #ddd; color: #333; border-radius: 12px; padding: 10px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #ffd700; border: none; color: #000; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #res { width: 100%; border-radius: 15px; margin-top: 20px; display: none; border: 2px solid #ffd700; }
        #loader { display: none; margin: 15px; font-weight: bold; color: #ffd700; text-shadow: 1px 1px #000; }
        .back { display: block; margin-top: 20px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>😂 FUNNY ENGINE</h3>
        <textarea id="p" placeholder="Enter something funny..."></textarea>
        <button class="btn" onclick="gen()">GENERATE</button>
        <div id="loader">Making you laugh... 🎭</div>
        <img id="res" src="">
    </div>
    <a href="index.html" class="back">← Back</a>
    <script>
        function gen() {
            const p = document.getElementById('p').value;
            const img = document.getElementById('res');
            const ld = document.getElementById('loader');
            if(!p) return alert("Kuch likhen!");
            img.style.display = "none";
            ld.style.display = "block";
            const seed = Math.floor(Math.random() * 100000);
            img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(p + ", funny, caricature, bright colors") + "?model=flux&width=1024&height=1024&nologo=true&seed=" + seed;
            img.onload = () => { ld.style.display = "none"; img.style.display = "block"; };
        }
    </script>
</body>
</html>
