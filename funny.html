
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Funny Mode</title>
    <style>
        body { background: #fffceb; color: #333; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 2px solid #ffd700; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80px; background: #f9f9f9; border: 1px solid #ddd; color: #333; border-radius: 10px; padding: 10px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #ffd700; border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #res { width: 100%; border-radius: 10px; margin-top: 20px; display: none; border: 2px solid #ffd700; }
        .back { display: block; margin-top: 20px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>😂 FUNNY ENGINE</h3>
        <textarea id="p" placeholder="Something funny (e.g. Cat wearing sunglasses)"></textarea>
        <button class="btn" onclick="gen()">MAKE ME LAUGH</button>
        <img id="res" src="">
    </div>
    <a href="index.html" class="back">← Back to Menu</a>
    <script>
        function gen() {
            const img = document.getElementById('res');
            const prompt = document.getElementById('p').value + ", funny, cartoon style, bright colors, hilarious";
            img.style.display = "block";
            img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?nologo=true&seed=" + Math.random();
        }
    </script>
</body>
</html>
