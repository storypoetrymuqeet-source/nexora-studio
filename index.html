<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI | Ultra Fast</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; border: 2px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #6366f1; letter-spacing: 2px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; padding: 10px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #6366f1; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        
        /* Loading Animation */
        .loader { display: none; margin: 20px auto; border: 4px solid #333; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result { margin-top: 20px; display: none; }
        img { width: 100%; border-radius: 15px; border: 1px solid #444; }
        .speed-tag { font-size: 12px; color: #00ff88; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <span class="speed-tag">● TURBO ENGINE ACTIVE</span>
    <h1>NEXORA AI</h1>
    <textarea id="prompt" placeholder="Describe your image..."></textarea>
    <button class="btn" onclick="gen()">GENERATE FAST</button>
    
    <div class="loader" id="loader"></div>
    <div id="result">
        <img id="img" src="">
    </div>
</div>

<script>
    async function gen() {
        const p = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const res = document.getElementById('result');
        const img = document.getElementById('img');

        if(!p) return alert("Write something!");

        // Reset and Show Loader
        loader.style.display = "block";
        res.style.display = "none";

        // FASTEST CONFIGURATION
        const key = "Sk_YkBNtGgM9Cbf1WnwiHhbmQZyNCYx47ob";
        const seed = Math.floor(Math.random() * 9999);
        // Humne 'model=turbo' use kiya hai jo sab se tez hai
        const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&model=turbo&nologo=true&auth=${key}`;

        img.src = url;

        img.onload = () => {
            loader.style.display = "none";
            res.style.display = "block";
        };
    }
</script>

</body>
</html>
