<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI | Server Fix</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        h1 { color: #6366f1; margin-bottom: 20px; text-shadow: 0 0 10px #6366f1; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #6366f1, #a855f7); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .loader { display: none; margin: 20px auto; border: 4px solid #333; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result { margin-top: 20px; display: none; }
        img { width: 100%; border-radius: 15px; border: 2px solid #6366f1; }
        .status { font-size: 11px; color: #00ff88; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="status" id="serverStat">● SERVER: STANDBY</div>
    <h1>NEXORA AI</h1>
    <textarea id="prompt" placeholder="Describe your horror scene..."></textarea>
    <button class="btn" id="genBtn" onclick="tryGenerate()">GENERATE (MULTI-SERVER)</button>
    
    <div class="loader" id="loader"></div>
    <div id="result">
        <img id="img" src="">
    </div>
</div>

<script>
    let attempt = 0;
    
    function tryGenerate() {
        const p = document.getElementById('prompt').value;
        if(!p) return alert("Kuch likhen!");
        
        attempt = 0;
        startGen(p);
    }

    function startGen(p) {
        const loader = document.getElementById('loader');
        const res = document.getElementById('result');
        const img = document.getElementById('img');
        const stat = document.getElementById('serverStat');
        const seed = Math.floor(Math.random() * 999999);

        loader.style.display = "block";
        res.style.display = "none";

        // Servers ki list
        const servers = [
            `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&nologo=true`,
            `https://pollinations.ai/p/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&model=flux`,
            `https://pollinations.ai/p/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&model=turbo`
        ];

        stat.innerText = `● TRYING SERVER ${attempt + 1}...`;
        img.src = servers[attempt];

        img.onload = () => {
            loader.style.display = "none";
            res.style.display = "block";
            stat.innerText = "● SERVER: CONNECTED ✅";
        };

        img.onerror = () => {
            attempt++;
            if(attempt < servers.length) {
                startGen(p); // Agle server par jao
            } else {
                loader.style.display = "none";
                stat.innerText = "● SERVER: BUSY ❌";
                alert("Sare servers busy hain. 10 second baad dobara koshish karein.");
            }
        };
    }
</script>

</body>
</html>
