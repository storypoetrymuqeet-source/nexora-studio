<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI Studio</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #161616; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        h1 { color: #6366f1; margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 15px; outline: none; resize: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #6366f1, #a855f7); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .loader { display: none; margin: 20px auto; border: 4px solid #333; border-top: 4px solid #6366f1; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result { margin-top: 20px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        img { width: 100%; border-radius: 15px; border: 1px solid #333; }
        .status-text { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-text">● SYSTEM READY</div>
    <h1>NEXORA AI</h1>
    <textarea id="prompt" placeholder="Describe your horror vision..."></textarea>
    <button class="btn" onclick="generate()">Generate Image</button>
    
    <div class="loader" id="loader"></div>
    
    <div id="result">
        <img id="outputImg" src="">
    </div>
</div>

<script>
    function generate() {
        const promptInput = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const outputImg = document.getElementById('outputImg');

        if (!promptInput) {
            alert("Please enter a prompt!");
            return;
        }

        // UI Updates
        loader.style.display = "block";
        resultDiv.style.display = "none";

        // Secret Key and Parameters
        const apiKey = "Sk_YkBNtGgM9Cbf1WnwiHhbmQZyNCYx47ob";
        const seed = Math.floor(Math.random() * 1000000);
        
        // Sab se stable URL format
        const finalUrl = `https://pollinations.ai/p/${encodeURIComponent(promptInput)}?width=512&height=512&seed=${seed}&model=flux&nologo=true`;

        // Image loading logic
        outputImg.src = finalUrl;

        outputImg.onload = function() {
            loader.style.display = "none";
            resultDiv.style.display = "block";
        };

        outputImg.onerror = function() {
            loader.style.display = "none";
            alert("Connection error! Please try again.");
        };
    }
</script>

</body>
</html>
