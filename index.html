<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI | Force Connect</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 0 40px rgba(255, 0, 0, 0.1); }
        h1 { color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5); margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #050505; border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #ff3e3e; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #ff1a1a; box-shadow: 0 0 20px #ff3e3e; }
        .loader { display: none; margin: 20px auto; border: 3px solid #222; border-top: 3px solid #ff3e3e; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res { margin-top: 20px; display: none; }
        img { width: 100%; border-radius: 15px; border: 1px solid #333; }
        .status-box { background: #1a0000; border: 1px solid #4d0000; padding: 10px; border-radius: 8px; font-size: 11px; margin-bottom: 15px; color: #ff8080; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-box" id="msg">● SYSTEM: BYPASSING SERVER LOAD...</div>
    <h1>NEXORA STRIKE</h1>
    <textarea id="prompt" placeholder="Enter prompt (e.g. Scary night in forest)"></textarea>
    <button class="btn" onclick="strike()">FORCE GENERATE</button>
    
    <div class="loader" id="loader"></div>
    <div id="res"><img id="output" src=""></div>
</div>

<script>
    async function strike() {
        const p = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const res = document.getElementById('res');
        const output = document.getElementById('output');
        const msg = document.getElementById('msg');

        if(!p) return alert("Prompt likhen!");

        loader.style.display = "block";
        res.style.display = "none";
        msg.innerText = "● ACTION: PINGING BACKUP NODES...";

        const seed = Math.floor(Math.random() * 10000000);
        
        // Is URL mein 'no-cache' aur 'random seed' server ko bypass karne mein madad karta hai
        const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&model=flux&nologo=true&enhance=false&t=${new Date().getTime()}`;

        output.src = url;

        output.onload = () => {
            loader.style.display = "none";
            res.style.display = "block";
            msg.innerText = "● STATUS: CONNECTED (SUCCESS)";
        };

        output.onerror = () => {
            // Agar 1st attempt fail ho to foran 2nd attempt karega
            const backupUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?seed=${seed+1}`;
            output.src = backupUrl;
            msg.innerText = "● ACTION: SWITCHING TO EMERGENCY SERVER...";
        };
    }
</script>

</body>
</html>
