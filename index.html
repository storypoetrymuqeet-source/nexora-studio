<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI | Image to Video Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 15px; }
        .card { background: #111; border: 1px solid #333; border-radius: 24px; padding: 20px; width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #6366f1; font-size: 22px; margin-bottom: 15px; letter-spacing: 1px; }
        
        textarea { width: 100%; height: 70px; background: #000; border: 1px solid #444; color: #fff; border-radius: 12px; padding: 10px; margin-bottom: 10px; outline: none; }
        
        /* Upload Section */
        .upload-box { background: #1a1a1a; border: 2px dashed #444; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; }
        .upload-box:hover { border-color: #6366f1; }
        #imgPreview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; display: none; margin: 10px auto; }

        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .mood-btn { background: #222; border: 1px solid #333; color: #888; padding: 8px 2px; border-radius: 8px; font-size: 10px; cursor: pointer; }
        .mood-btn.active { background: #6366f1; color: #fff; }

        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 14px; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 12px; }
        .img-btn { background: #6366f1; }
        .vid-btn { background: #f43f5e; }

        #loader { display: none; margin: 15px auto; border: 3px solid #222; border-top: 3px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultArea { margin-top: 15px; background: #080808; border-radius: 15px; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #222; }
        img, video { width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1>NEXORA STUDIO</h1>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 12px; color: #aaa;">📁 Click to Upload Photo</span>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
        <img id="imgPreview">
    </div>

    <textarea id="prompt" placeholder="Describe the motion (e.g. Waves moving, fire burning)"></textarea>
    
    <div class="mood-grid">
        <button class="mood-btn active" onclick="setMood('Horror', this)">Horror</button>
        <button class="mood-btn" onclick="setMood('Funny', this)">Funny</button>
        <button class="mood-btn" onclick="setMood('Serious', this)">Serious</button>
    </div>

    <div class="btn-group">
        <button class="btn img-btn" onclick="generate('image')">GENERATE IMAGE</button>
        <button class="btn vid-btn" onclick="generate('video')">IMAGE TO VIDEO</button>
    </div>

    <div id="loader"></div>

    <div id="resultArea">
        <div id="container" style="width: 100%;">
            <p style="color: #444; font-size: 11px;">Upload photo or write text</p>
        </div>
    </div>
</div>

<script>
    let currentMood = "Horror";
    let base64Image = "";

    function setMood(mood, el) {
        currentMood = mood;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = () => {
            const preview = document.getElementById('imgPreview');
            preview.src = reader.result;
            preview.style.display = "block";
            base64Image = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    async function generate(type) {
        const p = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const container = document.getElementById('container');
        
        loader.style.display = "block";
        container.innerHTML = "";

        const seed = Math.floor(Math.random() * 999999);
        const finalPrompt = `${p}, mood: ${currentMood}, high quality`;

        if (type === 'image') {
            const url = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=512&height=512&seed=${seed}&nologo=true`;
            container.innerHTML = `<img src="${url}" onload="document.getElementById('loader').style.display='none'">`;
        } else {
            // IMAGE TO VIDEO LOGIC
            // Note: If image is uploaded, we use a specialized prompt to animate it
            let videoUrl = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=512&height=512&model=video&seed=${seed}`;
            
            const video = document.createElement('video');
            video.src = videoUrl;
            video.controls = true;
            video.autoplay = true;
            video.loop = true;
            video.style.width = "100%";

            video.oncanplay = () => {
                loader.style.display = "none";
                container.appendChild(video);
            };
            
            // Backup show
            setTimeout(() => {
                if(loader.style.display === "block") {
                    loader.style.display = "none";
                    container.appendChild(video);
                }
            }, 12000);
        }
    }
</script>
</body>
</html>
