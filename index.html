<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI | Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .studio-card { background: #111; border: 1px solid #333; border-radius: 24px; padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 10px 50px rgba(99, 102, 241, 0.2); }
        h1 { color: #6366f1; margin-bottom: 10px; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #444; border-radius: 12px; color: #fff; padding: 15px; margin: 15px 0; font-size: 16px; outline: none; }
        textarea:focus { border-color: #6366f1; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .img-btn { background: #6366f1; color: white; }
        .vid-btn { background: #db2777; color: white; }
        #loading { margin-top: 15px; color: #6366f1; display: none; font-weight: bold; }
        #output-area { margin-top: 25px; width: 100%; display: none; }
        #output-area img, #output-area video { width: 100%; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="studio-card">
        <h1>Nexora AI</h1>
        <p style="color:#888;">Create Horror, Suspense & Magic</p>
        
        <textarea id="promptInput" placeholder="Describe your imagination... (e.g. A haunted house in rain)"></textarea>
        
        <div class="btn-row">
            <button class="img-btn" onclick="generate('image')">CREATE IMAGE</button>
            <button class="vid-btn" onclick="generate('video')">CREATE VIDEO</button>
        </div>

        <div id="loading">Nexora is working...</div>

        <div id="output-area">
            <img id="resImg" style="display:none;">
            <video id="resVid" controls style="display:none;"></video>
        </div>
    </div>

    <script>
        // YAHAN APNI API KEY PASTE KAREIN
        const API_KEY = "CONST_YOUR_API_KEY"; 

        function generate(type) {
            const prompt = document.getElementById('promptInput').value;
            const loading = document.getElementById('loading');
            const outputArea = document.getElementById('output-area');
            const resImg = document.getElementById('resImg');
            const resVid = document.getElementById('resVid');

            if(!prompt) return alert("Kuch to likhein!");

            loading.style.display = "block";
            outputArea.style.display = "none";
            resImg.style.display = "none";
            resVid.style.display = "none";

            const encodedPrompt = encodeURIComponent(prompt);
            const seed = Math.floor(Math.random() * 1000000);

            if(type === 'image') {
                const url = `https://pollinations.ai/p/${encodedPrompt}?width=1024&height=1024&seed=${seed}`;
                resImg.src = url;
                resImg.onload = () => {
                    loading.style.display = "none";
                    outputArea.style.display = "block";
                    resImg.style.display = "block";
                };
            } else {
                loading.innerText = "Video is generating... (takes about 30s)";
                // Pollinations Video Request
                const videoUrl = `https://pollinations.ai/p/${encodedPrompt}?model=video&seed=${seed}`;
                resVid.src = videoUrl;
                resVid.onloadeddata = () => {
                    loading.style.display = "none";
                    outputArea.style.display = "block";
                    resVid.style.display = "block";
                };
            }
        }
    </script>
</body>
</html>
