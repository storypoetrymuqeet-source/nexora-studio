<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI Studio</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; border: 2px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #6366f1; letter-spacing: 2px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; padding: 10px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #6366f1; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        
        .loader { display: none; margin: 20px auto; border: 4px solid #333; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultArea { margin-top: 20px; display: none; min-height: 200px; border: 1px dashed #444; border-radius: 15px; padding: 10px; }
        img { width: 100%; border-radius: 10px; display: block; }
        .mode-label { font-size: 11px; color: #888; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <span class="mode-label">ULTRA STABLE MODE</span>
    <h1>NEXORA AI</h1>
    <textarea id="prompt" placeholder="Write your horror vision here..."></textarea>
    <button class="btn" onclick="generate()">GENERATE NOW</button>
    
    <div class="loader" id="loader"></div>
    
    <div id="resultArea">
        <img id="outputImg" src="" alt="Result will appear here">
        <p id="errorMsg" style="color: red; display: none; font-size: 12px; margin-top: 10px;">Server is busy, try again in 5 seconds!</p>
    </div>
</div>

<script>
    function generate() {
        const p = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const resArea = document.getElementById('resultArea');
        const img = document.getElementById('outputImg');
        const error = document.getElementById('errorMsg');

        if(!p) return alert("Kuch likhen!");

        // Reset UI
        loader.style.display = "block";
        resArea.style.display = "none";
        error.style.display = "none";

        const seed = Math.floor(Math.random() * 999999);
        // Direct image path that bypasses most blocks
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=512&height=512&seed=${seed}&nologo=true`;

        img.src = url;

        img.onload = () => {
            loader.style.display = "none";
            resArea.style.display = "block";
        };

        img.onerror = () => {
            loader.style.display = "none";
            resArea.style.display = "block";
            img.style.display = "none";
            error.style.display = "block";
        };
    }
</script>

</body>
</html>
